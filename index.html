<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useCallback } = React;

/* ── DESIGN TOKENS ────────────────────────────────────────────── */
const C = {
  bg: "#12151B", panel: "#1A1F28", panelHi: "#20262F", border: "#2A313D",
  ink: "#E7E9EE", mute: "#7C8494", faint: "#4B5361",
  dormant: "#454B58", amber: "#E0A83C", red: "#C1453A", green: "#4F9E72",
  violet: "#9456C4", cyan: "#4FB8D6",
};
const STORAGE_KEY = "stock-tracker-v2";
const DEFAULT_WATCHLIST = ["STX", "WDC", "MU", "SNDK"];
const RUNG_COUNT = 5;
const STEP_DEFAULT = 0.15;

const OUTCOME_ACTIONS = {
  beatRaise: { label: "Beat + guidance raised", note: "Hold — reset System 1/2 levels; re-evaluate re-rating clause." },
  beatFlat: { label: "Beat + guidance flat/cautious", note: "Sell 10% — beat already priced in, guidance is the signal." },
  missUnchanged: { label: "Miss + guidance unchanged", note: "Sell 25% — deterioration, not yet thesis-breaking." },
  missCut: { label: "Miss + guidance cut", note: "Sell 40–50% — thesis may be at risk. Trigger System 4 review." },
};

const CHECKLIST = {
  cat1: { title: "Category 1 — Thesis Invalidation", items: [
    "A substitute product/technology reaches commercial-scale adoption",
    "Lost a top customer relationship to a competitor or in-house solution",
    "Core technology roadmap proves unscalable or suffers a major failure",
    "Primary competitive moat (cost, IP, capacity) has been closed by a rival",
  ]},
  cat2: { title: "Category 2 — Company-Specific Distress", items: [
    "CEO/CFO replaced under adverse circumstances",
    "SEC investigation or material accounting restatement",
    "Debt covenant breach or downgrade to junk",
    "Mass recall or systematic failure rate above norms",
  ]},
  cat3: { title: "Category 3 — Fundamental Deterioration (2-quarter rule)", items: [
    "Revenue growth negative YoY for 2 consecutive quarters",
    "Gross margin down 8+ points from peak, 2 consecutive quarters",
    "Core market share declining, 2 consecutive quarters",
    "End-market demand (customer capex) declining, 2 consecutive quarters",
  ]},
  cat4: { title: "Category 4 — Valuation Extreme", items: [
    "Trailing P/E > 120× with no growth acceleration beyond 20%",
    "Trailing P/E > 150× regardless of growth rate",
  ]},
  cat5: { title: "Category 5 — Income Concentration Risk", items: [
    "Credible signal that your own employment at this company is at risk",
  ]},
};

/* ── INDICATOR MATH ───────────────────────────────────────────── */
function fmtVol(n) {
  if (n == null) return "—";
  if (n >= 1e6) return (n / 1e6).toFixed(2) + "M";
  if (n >= 1e3) return (n / 1e3).toFixed(1) + "K";
  return String(n);
}
function extensionTranche(rungPrice, sma50) {
  // How far a given rung sits above the 50-day SMA, used to size the tranche —
  // a rung reached via a slow grind (still close to trend) gets the full 8%;
  // a rung reached via a fast, unconfirmed spike gets progressively less.
  if (!sma50 || sma50 <= 0) return 8;
  const ext = ((rungPrice - sma50) / sma50) * 100;
  if (ext <= 25) return 8;
  if (ext <= 50) return 5;
  return 3;
}
function peInsuranceTier(pe) {
  if (pe == null) return null;
  if (pe > 90) return { pct: 8, label: "> 90×" };
  if (pe >= 60) return { pct: 5, label: "60–90×" };
  return { pct: 2.5, label: "< 60×" };
}
// Anchor auto-management: tracks new ATHs upward automatically, and auto-resets
// downward if price has fallen to 65% or less of the anchor (a 35%+ drawdown) —
// on the theory that the original high is no longer a meaningful reference point
// once the position has fallen this far below it.
function updateAnchor(currentAnchor, latestPrice, yearHigh) {
  if (!currentAnchor) return { anchor: yearHigh, resetReason: null };
  if (latestPrice && latestPrice <= currentAnchor * 0.65) {
    return { anchor: latestPrice, resetReason: "drawdown" };
  }
  if (yearHigh > currentAnchor) {
    return { anchor: yearHigh, resetReason: null };
  }
  return { anchor: currentAnchor, resetReason: null };
}
function sma(closes, period) {
  const n = Math.min(period, closes.length);
  const slice = closes.slice(-n);
  return slice.reduce((a, b) => a + b, 0) / n;
}
function rsiWilder(closes, period = 14) {
  if (closes.length < period + 1) return null;
  let gains = 0, losses = 0;
  for (let i = 1; i <= period; i++) {
    const diff = closes[i] - closes[i - 1];
    if (diff >= 0) gains += diff; else losses += -diff;
  }
  let avgGain = gains / period, avgLoss = losses / period;
  for (let i = period + 1; i < closes.length; i++) {
    const diff = closes[i] - closes[i - 1];
    const gain = diff > 0 ? diff : 0;
    const loss = diff < 0 ? -diff : 0;
    avgGain = (avgGain * (period - 1) + gain) / period;
    avgLoss = (avgLoss * (period - 1) + loss) / period;
  }
  if (avgLoss === 0) return 100;
  const rs = avgGain / avgLoss;
  return 100 - 100 / (1 + rs);
}
function ema(values, period) {
  const k = 2 / (period + 1);
  const out = [values[0]];
  for (let i = 1; i < values.length; i++) out.push(values[i] * k + out[i - 1] * (1 - k));
  return out;
}
function macd(closes, fast = 12, slow = 26, signal = 9) {
  const emaFast = ema(closes, fast);
  const emaSlow = ema(closes, slow);
  const macdLine = closes.map((_, i) => emaFast[i] - emaSlow[i]);
  const signalLine = ema(macdLine, signal);
  return { macdLine, signalLine };
}
function isoWeekKey(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  const day = (d.getDay() + 6) % 7;
  d.setDate(d.getDate() - day + 3);
  const firstThursday = new Date(d.getFullYear(), 0, 4);
  const fdDay = (firstThursday.getDay() + 6) % 7;
  firstThursday.setDate(firstThursday.getDate() - fdDay + 3);
  const weekNo = 1 + Math.round((d - firstThursday) / (7 * 86400000));
  return `${d.getFullYear()}-W${String(weekNo).padStart(2, "0")}`;
}
function resampleWeeklyCompleted(bars) {
  const lastBar = bars[bars.length - 1];
  const lastWeekday = new Date(lastBar.date + "T00:00:00").getDay(); // 5 = Friday
  const currentWeek = isoWeekKey(lastBar.date);
  const lastWeekIsFinished = lastWeekday === 5; // a Friday close means that trading week is actually done, not still forming
  const weeks = {};
  for (const b of bars) {
    const k = isoWeekKey(b.date);
    if (k === currentWeek && !lastWeekIsFinished) continue;
    weeks[k] = b;
  }
  return Object.keys(weeks).sort().map((k) => weeks[k]);
}

// Detects whether the most recent daily bar represents a session still in
// progress (market open) rather than a confirmed close. Twelve Data's daily
// bar for "today" updates live throughout the session — partial volume,
// a "close" that's really just the current price — and treating that as a
// finished trading day would let an in-progress session's naturally-lower
// partial volume reset a real Path 1/3 streak that Thursday and Friday
// already confirmed. Same principle as the weekly MACD confirmation timing,
// just applied one timeframe down.
function easternDateString(date) {
  return new Intl.DateTimeFormat("en-CA", { timeZone: "America/New_York", year: "numeric", month: "2-digit", day: "2-digit" }).format(date);
}
function easternMinutesOfDay(date) {
  const parts = new Intl.DateTimeFormat("en-US", { timeZone: "America/New_York", hour: "numeric", minute: "numeric", hour12: false }).formatToParts(date);
  const hour = parseInt(parts.find((p) => p.type === "hour").value, 10) % 24;
  const minute = parseInt(parts.find((p) => p.type === "minute").value, 10);
  return hour * 60 + minute;
}
function isBarProvisional(barDate) {
  const now = new Date();
  if (barDate !== easternDateString(now)) return false; // not today's bar at all — already closed
  const dayOfWeek = new Date(now.toLocaleString("en-US", { timeZone: "America/New_York" })).getDay();
  if (dayOfWeek === 0 || dayOfWeek === 6) return false; // weekend bar can't be an in-progress session
  return easternMinutesOfDay(now) < 16 * 60; // before 4:00 PM ET = session still open, bar not final
}

// Best-effort trailing EPS: sums the last 4 quarters of *actually reported*
// EPS (not forward-looking estimates for unreported quarters) from Twelve
// Data's earnings endpoint. This is a different, more trustworthy category of
// data than the earnings-date calendar that turned out stale earlier — it's a
// historical fact recorded once after each report, not a predicted future date
// that needs ongoing maintenance. Still best-effort: returns null on anything
// that doesn't look right, and never overwrites a value you've entered yourself.
async function fetchTrailingEPS(symbol, apiKey) {
  try {
    const url = `https://api.twelvedata.com/earnings?symbol=${encodeURIComponent(symbol)}&apikey=${encodeURIComponent(apiKey)}`;
    const res = await fetch(url);
    const data = await res.json();
    if (!data || data.status === "error") return null;
    const list = Array.isArray(data.earnings) ? data.earnings : Array.isArray(data) ? data : [];
    const today = new Date().toISOString().slice(0, 10);
    const reported = list
      .filter((e) => e.date && e.date < today && e.eps_actual != null && e.eps_actual !== "")
      .sort((a, b) => b.date.localeCompare(a.date))
      .slice(0, 4);
    if (reported.length < 4) return null;
    const ttmEPS = reported.reduce((sum, e) => sum + parseFloat(e.eps_actual), 0);
    return ttmEPS > 0 ? Math.round(ttmEPS * 100) / 100 : null;
  } catch {
    return null;
  }
}

async function fetchAndCompute(symbol, apiKey) {
  const url = `https://api.twelvedata.com/time_series?symbol=${encodeURIComponent(symbol)}&interval=1day&outputsize=260&prepost=false&apikey=${encodeURIComponent(apiKey)}`;
  const res = await fetch(url);
  const data = await res.json();
  if (data.status === "error" || !data.values) {
    throw new Error(data.message || `No data returned for "${symbol}". Check the symbol and your API key.`);
  }
  const bars = data.values
    .map((v) => ({ date: v.datetime, open: parseFloat(v.open), high: parseFloat(v.high), low: parseFloat(v.low), close: parseFloat(v.close), volume: parseFloat(v.volume) }))
    .sort((a, b) => a.date.localeCompare(b.date));

  if (bars.length < 55) throw new Error("Not enough history returned to compute reliable indicators yet.");

  const closes = bars.map((b) => b.close);
  const yearHigh = Math.max(...bars.map((b) => b.high));

  let weeklyMacdBearish = false;
  let macdLineVal = null;
  let macdSignalVal = null;
  const weeklyBars = resampleWeeklyCompleted(bars);
  if (weeklyBars.length >= 35) {
    const { macdLine, signalLine } = macd(weeklyBars.map((b) => b.close));
    const i = macdLine.length - 1;
    weeklyMacdBearish = macdLine[i] < signalLine[i];
    macdLineVal = macdLine[i];
    macdSignalVal = signalLine[i];
  }

  // Provisional reading — includes the current, still-forming week using its most
  // recent daily close as a stand-in. This is what a live TradingView weekly chart
  // shows you mid-week, and it can differ from (and reverse before) the confirmed
  // reading above. Surfacing both makes that discrepancy visible instead of
  // looking like a bug.
  let weeklyMacdBearishProvisional = weeklyMacdBearish;
  let macdLineProvisional = macdLineVal;
  let macdSignalProvisional = macdSignalVal;
  const weeksAll = {};
  for (const b of bars) weeksAll[isoWeekKey(b.date)] = b;
  const weeklyBarsAll = Object.keys(weeksAll).sort().map((k) => weeksAll[k]);
  if (weeklyBarsAll.length >= 35) {
    const { macdLine, signalLine } = macd(weeklyBarsAll.map((b) => b.close));
    const i = macdLine.length - 1;
    weeklyMacdBearishProvisional = macdLine[i] < signalLine[i];
    macdLineProvisional = macdLine[i];
    macdSignalProvisional = signalLine[i];
  }

  // Backfill ~3 weeks of trading days so Path 3's streak and the dual-confirmation
  // window are accurate from the very first fetch, not just from today onward.
  // Each day is computed using only data available up to that day — no lookahead.
  const BACKFILL_DAYS = 15;
  const startIdx = Math.max(49, bars.length - BACKFILL_DAYS);
  const entries = [];
  for (let i = startIdx; i < bars.length; i++) {
    const closesUpToI = closes.slice(0, i + 1);
    const sma50_i = sma(closesUpToI, 50);
    const sma20_i = sma(closesUpToI, 20);
    const windowStart = Math.max(0, i - 19);
    const vol20_i = bars.slice(windowStart, i + 1).reduce((a, b) => a + b.volume, 0) / (i + 1 - windowStart);
    const volAbove_i = bars[i].volume > vol20_i;
    const rsi_i = rsiWilder(closesUpToI, 14);
    entries.push({
      date: bars[i].date,
      price: Math.round(bars[i].close * 100) / 100,
      sma50: Math.round(sma50_i * 100) / 100,
      sma20: Math.round(sma20_i * 100) / 100,
      volume: volAbove_i ? "above" : "below",
      volumeRaw: Math.round(bars[i].volume),
      volumeAvg: Math.round(vol20_i),
      rsi: rsi_i !== null ? Math.round(rsi_i * 10) / 10 : null,
      weeklyMacdBearish,
      macdLine: macdLineVal !== null ? Math.round(macdLineVal * 1000) / 1000 : null,
      macdSignal: macdSignalVal !== null ? Math.round(macdSignalVal * 1000) / 1000 : null,
      macdLineProvisional: macdLineProvisional !== null ? Math.round(macdLineProvisional * 1000) / 1000 : null,
      macdSignalProvisional: macdSignalProvisional !== null ? Math.round(macdSignalProvisional * 1000) / 1000 : null,
      weeklyMacdBearishProvisional,
      sellPct: 0,
      provisional: i === bars.length - 1 && isBarProvisional(bars[i].date),
    });
  }

  return { entries, yearHigh: Math.round(yearHigh * 100) / 100 };
}

/* ── System 2 path logic ──────────────────────────────────────── */
function computeDerived(entries, anchor) {
  const sorted = [...entries].sort((a, b) => a.date.localeCompare(b.date));
  // sellOnly entries are placeholders for logging a sell on a date with no real
  // market data. Provisional entries are an in-progress trading session's live,
  // still-updating bar. Neither should participate in SMA/volume streak logic —
  // a provisional day's naturally partial volume would otherwise reset a real
  // Path 1/3 streak simply because the session isn't over yet.
  const technical = sorted.filter((e) => !e.sellOnly && !e.provisional);
  const liveEntry = sorted[sorted.length - 1] || null;
  let path1Streak = 0, path3Streak = 0, ewStreak = 0, p4Tier = 0;
  let prevP1 = false, prevP3 = false, prevP2 = false;
  const fires = [];
  const P4_TIERS = [{ tier: 1, threshold: 15, pct: 10 }, { tier: 2, threshold: 25, pct: 15 }, { tier: 3, threshold: 35, pct: 20 }];

  for (const e of technical) {
    const below = Number(e.price) < Number(e.sma50);
    const below20 = e.sma20 != null ? Number(e.price) < Number(e.sma20) : false;
    const volAbove = e.volume === "above";

    ewStreak = below20 ? ewStreak + 1 : 0;

    path1Streak = below && volAbove ? path1Streak + 1 : 0;
    const p1now = path1Streak >= 2;
    if (p1now && !prevP1) fires.push({ path: 1, date: e.date });
    prevP1 = p1now;

    path3Streak = below ? path3Streak + 1 : 0;
    const p3now = path3Streak >= 5;
    if (p3now && !prevP3) fires.push({ path: 3, date: e.date });
    prevP3 = p3now;

    const p2now = !!e.weeklyMacdBearish;
    if (p2now && !prevP2) fires.push({ path: 2, date: e.date });
    prevP2 = p2now;

    // Path 4: magnitude of decline from anchor, combined with SMA (not volume) —
    // deliberately no volume gate, since Path 4's job is catching declines
    // (fast or slow, loud or quiet) that the time/crossover paths above can miss.
    let currentTier = 0;
    if (anchor && below) {
      const drawdownPct = ((anchor - Number(e.price)) / anchor) * 100;
      for (const t of P4_TIERS) if (drawdownPct >= t.threshold) currentTier = t.tier;
    }
    if (currentTier > p4Tier) fires.push({ path: 4, date: e.date, tier: currentTier });
    p4Tier = currentTier;
  }

  const latest = technical[technical.length - 1] || null;
  let dual = null;
  for (let i = 0; i < fires.length; i++)
    for (let j = i + 1; j < fires.length; j++)
      if (fires[j].path !== fires[i].path) {
        const days = Math.abs((new Date(fires[j].date) - new Date(fires[i].date)) / 86400000);
        if (days <= 21) dual = [fires[i], fires[j]];
      }

  const trailing10 = sorted.slice(-10);
  const cumSellPct = trailing10.reduce((s, e) => s + (Number(e.sellPct) || 0), 0);
  // Build the visual rolling-window timeline: for each of the (up to) 10 days,
  // how many more trading days until it rolls off the 10-day cap window, and
  // whether a sell was logged on it. Day position is 1-indexed, oldest first.
  const padding = 10 - trailing10.length;
  const rollingWindow = trailing10.map((e, i) => ({
    date: e.date,
    price: e.sellPct > 0 && e.sellPrice ? e.sellPrice : e.price,
    sellPct: Number(e.sellPct) || 0,
    dayPosition: i + 1 + padding,
    daysUntilRollOff: i + padding,
  }));
  const sellEvents = rollingWindow.filter((d) => d.sellPct > 0);

  return { sorted, latest, liveEntry, isLiveProvisional: !!(liveEntry && liveEntry.provisional), path1Streak, path3Streak, ewStreak, path2Active: prevP2, p4Tier, p4Info: P4_TIERS.find((t) => t.tier === p4Tier) || null, fires, dual, cumSellPct, rollingWindow, sellEvents };
}

function computeReentry(entries, fires, manualConfirmed) {
  if (!fires || fires.length === 0) return { relevant: false };
  const sorted = [...entries].sort((a, b) => a.date.localeCompare(b.date));
  const lastFireDate = fires[fires.length - 1].date;
  const since = sorted.filter((e) => e.date >= lastFireDate);

  let hadDip = false;
  for (const e of since) if (e.rsi != null && e.rsi < 45) hadDip = true;

  const last = since[since.length - 1];
  const prev = since[since.length - 2];
  const turnedUp = !!(last && prev && last.rsi != null && prev.rsi != null && last.rsi > prev.rsi);
  const rsiCondition = hadDip && turnedUp;
  const smaReclaim = !!(last && Number(last.price) > Number(last.sma50) && last.volume === "above");

  return { relevant: true, rsiCondition, smaReclaim, manualConfirmed, allMet: rsiCondition && smaReclaim && manualConfirmed };
}

// System 1 batch-cap ladder: rungs fire in batches of 5, then go dormant until
// either a re-rating event (manual, via the reset button) or a genuine "digestion"
// pattern — a 15%+ pullback from a local high followed by a new high above the
// last fired rung. A hard floor blocks any rung that would take remaining
// position below 50% of the original share count.
function computeLadderState(entries, anchor, step, resetDate) {
  const sorted = [...entries].sort((a, b) => a.date.localeCompare(b.date));
  if (!anchor) return { rungsFired: 0, dormant: false, batchNumber: 1, remainingPct: 100, floorBlocked: false };

  // After a reset, the anchor represents a low point to rebuild from, not a high
  // to reclaim — so the first rung due after a reset requires a genuine step-size
  // climb (anchor × 1.15) rather than just being at/above the anchor itself,
  // which any tiny uptick the very next day would otherwise trivially satisfy.
  const rungOffset = resetDate ? 1 : 0;

  let rungsFired = 0;
  let dormant = false;
  let floorBlocked = false;
  let localHigh = anchor;
  let lowestSinceHigh = null;

  for (const e of sorted) {
    const price = Number(e.price);
    const eligibleForFiring = !resetDate || e.date > resetDate;
    const effectiveIndex = eligibleForFiring ? rungsFired + rungOffset : rungsFired;
    const nextRungPrice = anchor * Math.pow(1 + step, effectiveIndex);
    const remainingIfFired = Math.pow(0.92, rungsFired + 1) * 100;

    if (eligibleForFiring && !dormant && !floorBlocked && price > nextRungPrice) {
      if (remainingIfFired < 50) {
        floorBlocked = true;
      } else {
        rungsFired += 1;
        localHigh = price;
        lowestSinceHigh = price;
        if (rungsFired % 5 === 0) dormant = true;
        continue;
      }
    }

    if (price > localHigh) { localHigh = price; lowestSinceHigh = price; }
    if (lowestSinceHigh === null || price < lowestSinceHigh) lowestSinceHigh = price;

    if (dormant && !floorBlocked) {
      const pullbackPct = ((localHigh - lowestSinceHigh) / localHigh) * 100;
      const lastFiredRungPrice = anchor * Math.pow(1 + step, rungsFired - 1);
      if (pullbackPct >= 15 && price > lastFiredRungPrice) dormant = false;
    }
  }

  const remainingPct = Math.round(Math.pow(0.92, rungsFired) * 100);
  return { rungsFired, dormant, floorBlocked, batchNumber: Math.floor(rungsFired / 5) + 1, remainingPct };
}

// Mandatory review escalation: after a "severe" System 2 event (30% dual
// confirmation, or Path 4's 35% tier), a new low within the following 10
// trading days forces a deliberate System 4 review rather than either silently
// re-firing the same paths or auto-liquidating on price alone.
function computeMandatoryReview(entries, fires, dual) {
  const severeDates = [];
  if (dual) severeDates.push(dual[0].date > dual[1].date ? dual[0].date : dual[1].date);
  for (const f of fires) if (f.path === 4 && f.tier === 3) severeDates.push(f.date);
  if (severeDates.length === 0) return { relevant: false };

  const sorted = [...entries].sort((a, b) => a.date.localeCompare(b.date));
  const lastSevereDate = severeDates.sort().slice(-1)[0];
  const severeIdx = sorted.findIndex((e) => e.date === lastSevereDate);
  if (severeIdx === -1) return { relevant: false };

  const severePrice = Number(sorted[severeIdx].price);
  const window = sorted.slice(severeIdx + 1, severeIdx + 11);
  const newLow = window.some((e) => Number(e.price) < severePrice);

  return { relevant: true, severeDate: lastSevereDate, newLowWithinWindow: newLow, daysElapsed: window.length };
}

/* ── UI atoms (icons replaced with unicode — no icon-library dependency) ── */
function StateLight({ state }) {
  const color = { dormant: C.dormant, building: C.amber, triggered: C.red, positive: C.green }[state];
  return <span style={{ display: "inline-block", width: 9, height: 9, borderRadius: 999, background: color, boxShadow: state === "triggered" ? `0 0 8px ${color}` : "none", flexShrink: 0 }} />;
}
function Tally({ count, total }) {
  return (
    <div style={{ display: "flex", gap: 4 }}>
      {Array.from({ length: total }).map((_, i) => (
        <div key={i} style={{ width: 14, height: 8, borderRadius: 2, background: i < count ? (count >= total ? C.red : C.amber) : C.dormant }} />
      ))}
    </div>
  );
}
function Panel({ children, style }) {
  return <div style={{ background: C.panel, border: `1px solid ${C.border}`, borderRadius: 8, padding: 16, ...style }}>{children}</div>;
}
function Label({ children }) {
  return <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10.5, letterSpacing: "0.06em", textTransform: "uppercase", color: C.mute, marginBottom: 6 }}>{children}</div>;
}
function NumInput({ value, onChange, placeholder }) {
  return (
    <input type="number" inputMode="decimal" value={value} onChange={(e) => onChange(e.target.value)} placeholder={placeholder}
      style={{ width: "100%", background: C.panelHi, border: `1px solid ${C.border}`, borderRadius: 6, padding: "8px 10px", color: C.ink, fontFamily: "'IBM Plex Mono', monospace", fontSize: 14, outline: "none" }} />

}
function TextInput({ value, onChange, placeholder, onEnter }) {
  return (
    <input type="text" autoCapitalize="none" autoCorrect="off" spellCheck={false} value={value} onChange={(e) => onChange(e.target.value)}
      onKeyDown={(e) => e.key === "Enter" && onEnter && onEnter()} placeholder={placeholder}
      style={{ width: "100%", background: C.panelHi, border: `1px solid ${C.border}`, borderRadius: 6, padding: "8px 10px", color: C.ink, fontFamily: "'IBM Plex Mono', monospace", fontSize: 14, outline: "none" }} />
  );
}
function Toggle({ value, onChange, onLabel, offLabel }) {
  return (
    <div style={{ display: "flex", borderRadius: 6, overflow: "hidden", border: `1px solid ${C.border}`, background: C.bg }}>
      <button onClick={() => onChange(false)} style={{ flex: 1, padding: "8px 10px", fontSize: 12.5, fontWeight: 600, border: "none", cursor: "pointer", background: !value ? C.panelHi : "transparent", color: !value ? C.ink : C.faint }}>{offLabel}</button>
      <button onClick={() => onChange(true)} style={{ flex: 1, padding: "8px 10px", fontSize: 12.5, fontWeight: 600, border: "none", cursor: "pointer", background: value ? C.amber : "transparent", color: value ? "#1A1306" : C.faint }}>{onLabel}</button>
    </div>
  );
}
function Collapsible({ title, defaultOpen, children }) {
  const [open, setOpen] = useState(!!defaultOpen);
  return (
    <div style={{ borderTop: `1px solid ${C.border}`, paddingTop: 10, marginTop: 10 }}>
      <button onClick={() => setOpen(!open)} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", width: "100%", background: "none", border: "none", cursor: "pointer", padding: 0, color: C.ink, fontSize: 13.5, fontWeight: 600 }}>
        {title}
        <span style={{ color: C.mute, fontSize: 11 }}>{open ? "▲" : "▼"}</span>
      </button>
      {open && <div style={{ marginTop: 10 }}>{children}</div>}
    </div>
  );
}
function StatusPill({ label, state }) {
  const bg = { dormant: "rgba(69,75,88,0.25)", building: "rgba(224,168,60,0.18)", triggered: "rgba(193,69,58,0.18)", positive: "rgba(79,158,114,0.18)" }[state];
  const fg = { dormant: C.mute, building: C.amber, triggered: C.red, positive: C.green }[state];
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 5, background: bg, borderRadius: 999, padding: "4px 9px" }}>
      <StateLight state={state} />
      <span style={{ fontSize: 10.5, fontWeight: 700, color: fg }}>{label}</span>
    </div>
  );
}
function RollingCapVisual({ rollingWindow, sellEvents, cumSellPct, onClear }) {
  const padCount = 10 - rollingWindow.length;
  return (
    <div>
      <div style={{ display: "flex", gap: 3, marginBottom: 8 }}>
        {Array.from({ length: padCount }).map((_, i) => (
          <div key={`pad${i}`} style={{ flex: 1, height: 20, borderRadius: 3, background: "transparent", border: `1px dashed ${C.border}` }} title="No data yet" />
        ))}
        {rollingWindow.map((d) => {
          const sold = d.sellPct > 0;
          const intensity = Math.min(d.sellPct / 20, 1); // ramps color toward red as sell % rises
          const bg = sold ? `rgba(193,69,58,${0.25 + intensity * 0.55})` : C.dormant;
          return (
            <div
              key={d.date}
              title={`Day ${d.dayPosition} of 10 (${d.date})${sold ? ` — sold ${d.sellPct}% at $${d.price}` : " — no sell"} · rolls off in ${d.daysUntilRollOff}d`}
              style={{ flex: 1, height: 20, borderRadius: 3, background: bg, display: "flex", alignItems: "center", justifyContent: "center" }}
            >
              {sold && <span style={{ fontSize: 8, fontWeight: 700, color: "#fff" }}>{Math.round(d.sellPct)}</span>}
            </div>
          );
        })}
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 9, color: C.faint, marginBottom: 10 }}>
        <span>10 days ago</span>
        <span>Today</span>
      </div>
      {sellEvents.length > 0 && (
        <div style={{ marginBottom: 4 }}>
          {sellEvents.map((s, i) => (
            <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 10.5, padding: "5px 0", borderBottom: i < sellEvents.length - 1 ? `1px solid ${C.border}` : "none" }}>
              <span style={{ color: C.ink }}>
                Day {s.dayPosition} of 10 <span style={{ color: C.mute }}>({s.date})</span>
              </span>
              <span style={{ display: "flex", alignItems: "center", gap: 6 }}>
                <span style={{ fontFamily: "'IBM Plex Mono', monospace", color: C.mute }}>
                  ${s.price} · <strong style={{ color: C.amber }}>{s.sellPct}%</strong> · rolls off in {s.daysUntilRollOff}d
                </span>
                <span onClick={() => onClear(s.date)} title="Clear this sell record" style={{ color: C.red, cursor: "pointer", fontSize: 12, padding: "0 2px" }}>✕</span>
              </span>
            </div>
          ))}
        </div>
      )}
      <div style={{ fontSize: 11.5, color: C.mute }}>
        Total in window: <strong style={{ color: C.ink }}>{cumSellPct}%</strong> of 35% cap
      </div>
    </div>
  );
}

/* ── MAIN ─────────────────────────────────────────────────────── */
function StockTracker() {
  const [apiKey, setApiKey] = useState("");
  const [apiKeyInput, setApiKeyInput] = useState("");
  const [watchlist, setWatchlist] = useState(DEFAULT_WATCHLIST);
  const [activeSymbol, setActiveSymbol] = useState("STX");
  const [bySymbol, setBySymbol] = useState({});
  const [addSymbolInput, setAddSymbolInput] = useState("");
  const [loaded, setLoaded] = useState(false);
  const [fetching, setFetching] = useState(false);
  const [fetchError, setFetchError] = useState("");
  const [lastUrl, setLastUrl] = useState("");
  const [lastFetched, setLastFetched] = useState(null);
  const [manualMode, setManualMode] = useState(false);
  const [manualForm, setManualForm] = useState({ price: "", sma50: "", volume: "below", rsi: "", weeklyMacdBearish: false });
  const [volEditOpen, setVolEditOpen] = useState(false);
  const [volEditRaw, setVolEditRaw] = useState("");
  const [volEditAvg, setVolEditAvg] = useState("");

  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const p = JSON.parse(raw);
        setApiKey(p.apiKey || "");
        setWatchlist(p.watchlist || DEFAULT_WATCHLIST);
        setActiveSymbol(p.activeSymbol || "STX");
        setBySymbol(p.bySymbol || {});
      }
    } catch { /* first run, nothing stored yet */ }
    setLoaded(true);
  }, []);

  useEffect(() => {
    if (!loaded) return;
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ apiKey, watchlist, activeSymbol, bySymbol }));
    } catch { /* storage unavailable — non-fatal */ }
  }, [apiKey, watchlist, activeSymbol, bySymbol, loaded]);

  const sym = bySymbol[activeSymbol] || { entries: [], anchor: null, step: STEP_DEFAULT, earningsDate: "", earningsOutcome: null, checklist: {}, reentryConfirmed: false, trailingEPS: null, lastAnchorReset: null, trailingEPSSource: null };

  const updateSym = useCallback((patch) => {
    setBySymbol((prev) => ({ ...prev, [activeSymbol]: { ...(prev[activeSymbol] || sym), ...patch } }));
  }, [activeSymbol, sym]);

  const runFetch = useCallback(async (symbol) => {
    if (!apiKey) return;
    setFetching(true);
    setFetchError("");
    try {
      const [{ entries: fetchedEntries, yearHigh }, autoEPS] = await Promise.all([
        fetchAndCompute(symbol, apiKey),
        fetchTrailingEPS(symbol, apiKey),
      ]);
      setBySymbol((prev) => {
        const cur = prev[symbol] || { entries: [], anchor: null, step: STEP_DEFAULT, earningsDate: "", earningsOutcome: null, checklist: {}, reentryConfirmed: false, trailingEPS: null, lastAnchorReset: null, trailingEPSSource: null };
        const fetchedDates = new Set(fetchedEntries.map((e) => e.date));
        const keptOld = cur.entries.filter((e) => !fetchedDates.has(e.date));
        const merged = [...keptOld, ...fetchedEntries].sort((a, b) => a.date.localeCompare(b.date));
        const latestPrice = merged.length ? merged[merged.length - 1].price : null;
        const { anchor: newAnchor, resetReason } = updateAnchor(cur.anchor, latestPrice, yearHigh);
        // Never overwrite an EPS the user entered themselves — only fill it in
        // if the field is genuinely empty, and remember it came from auto-fetch
        // so the UI can flag it as unverified rather than presenting it as fact.
        const epsUnset = cur.trailingEPS == null;
        return {
          ...prev,
          [symbol]: {
            ...cur,
            entries: merged,
            anchor: newAnchor,
            lastAnchorReset: resetReason ? merged[merged.length - 1].date : cur.lastAnchorReset,
            trailingEPS: epsUnset && autoEPS ? autoEPS : cur.trailingEPS,
            trailingEPSSource: epsUnset && autoEPS ? "auto" : cur.trailingEPSSource,
          },
        };
      });
      setLastFetched(new Date().toLocaleTimeString());
    } catch (err) {
      const raw = (err && err.message) || "";
      const networkLevel = /load failed|failed to fetch|network/i.test(raw);
      setFetchError(networkLevel ? "Could not reach Twelve Data — check your internet connection, or the key may be invalid/rate-limited." : raw || "Fetch failed — check your API key, the symbol, or try manual mode below.");
      setLastUrl(`https://api.twelvedata.com/time_series?symbol=${encodeURIComponent(symbol)}&interval=1day&outputsize=260&apikey=${encodeURIComponent(apiKey)}`);
    }
    setFetching(false);
  }, [apiKey]);

  useEffect(() => {
    if (loaded && apiKey && activeSymbol) runFetch(activeSymbol);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [loaded, activeSymbol, apiKey]);

  const derived = useMemo(() => computeDerived(sym.entries, sym.anchor), [sym.entries, sym.anchor]);

  const ladderState = useMemo(() => computeLadderState(sym.entries, sym.anchor, sym.step || STEP_DEFAULT, sym.lastAnchorReset), [sym.entries, sym.anchor, sym.step, sym.lastAnchorReset]);
  const mandatoryReview = useMemo(() => computeMandatoryReview(sym.entries, derived.fires, derived.dual), [sym.entries, derived.fires, derived.dual]);

  const rungs = useMemo(() => {
    const anchor = sym.anchor || 0;
    const step = sym.step || STEP_DEFAULT;
    const offset = sym.lastAnchorReset ? 1 : 0;
    const count = Math.max(RUNG_COUNT, ladderState.rungsFired + 5);
    return Array.from({ length: count }, (_, i) => Math.round(anchor * Math.pow(1 + step, i + offset)));
  }, [sym.anchor, sym.step, sym.lastAnchorReset, ladderState.rungsFired]);

  const daysToEarnings = sym.earningsDate ? Math.round((new Date(sym.earningsDate) - new Date()) / 86400000) : null;
  const currentPE = sym.trailingEPS && derived.latest ? derived.latest.price / sym.trailingEPS : null;
  const peTier = peInsuranceTier(currentPE);
  const flaggedCount = Object.values(sym.checklist || {}).filter(Boolean).length;

  const reentry = useMemo(() => computeReentry(sym.entries, derived.fires, !!sym.reentryConfirmed), [sym.entries, derived.fires, sym.reentryConfirmed]);
  const reentryBlocked = flaggedCount > 0;
  const reentryFinal = reentry.relevant && reentry.allMet && !reentryBlocked;
  const toggleReentryConfirm = () => updateSym({ reentryConfirmed: !sym.reentryConfirmed });

  const [sellLogInput, setSellLogInput] = useState("");
  const [sellLogDate, setSellLogDate] = useState("");
  const [sellLogPrice, setSellLogPrice] = useState("");
  useEffect(() => {
    if (!sellLogDate && derived.latest) setSellLogDate(derived.latest.date);
  }, [derived.latest, sellLogDate]);
  const logSell = () => {
    const pct = parseFloat(sellLogInput);
    const chosenDate = sellLogDate || (derived.latest ? derived.latest.date : new Date().toISOString().slice(0, 10));
    if (!pct || !chosenDate) return;
    const execPrice = sellLogPrice ? parseFloat(sellLogPrice) : null;
    const existing = (sym.entries || []).find((e) => e.date === chosenDate);
    let updated;
    if (existing) {
      updated = sym.entries.map((e) =>
        e.date === chosenDate
          ? { ...e, sellPct: (Number(e.sellPct) || 0) + pct, sellPrice: execPrice ?? e.sellPrice ?? e.price }
          : e
      );
    } else {
      // No market-data entry for this date (outside the backfill window). Mark it
      // sellOnly so computeDerived excludes it from Path 1–4's technical streaks
      // entirely — it should count toward the rolling cap only, never silently
      // masquerade as a real "price == SMA" trading day that resets a streak.
      updated = [...(sym.entries || []), { date: chosenDate, price: execPrice || 0, sma50: null, volume: null, rsi: null, weeklyMacdBearish: false, sellPct: pct, sellPrice: execPrice, sellOnly: true }];
    }
    updateSym({ entries: updated });
    setSellLogInput("");
    setSellLogPrice("");
  };
  const clearSell = (date) => {
    const updated = (sym.entries || [])
      .map((e) => (e.date === date ? { ...e, sellPct: 0, sellPrice: null } : e))
      .filter((e) => !(e.sellOnly && e.sellPct === 0)); // drop sell-only placeholder entries entirely once cleared
    updateSym({ entries: updated });
  };

  const p1state = derived.path1Streak >= 2 ? "triggered" : derived.path1Streak > 0 ? "building" : "dormant";
  const p3state = derived.path3Streak >= 5 ? "triggered" : derived.path3Streak > 0 ? "building" : "dormant";
  const p2state = derived.path2Active ? "triggered" : "dormant";
  const p4state = derived.p4Tier > 0 ? "triggered" : "dormant";
  const sys2Overall = derived.dual ? "triggered" : [p1state, p2state, p3state, p4state].includes("triggered") ? "triggered" : [p1state, p2state, p3state].includes("building") ? "building" : "positive";
  const sys3Overall = daysToEarnings !== null && daysToEarnings <= 3 && daysToEarnings >= 0 ? "building" : "dormant";
  const sys4Overall = flaggedCount > 0 ? "triggered" : "dormant";
  const nextRungIdx = rungs.findIndex((r) => derived.latest && r > derived.latest.price);
  const sys1Overall = nextRungIdx === 0 && derived.latest && derived.latest.price / rungs[0] > 0.95 ? "building" : "dormant";
  const latestBelow = derived.latest && sym.anchor ? Number(derived.latest.price) < Number(derived.latest.sma50) : null;

  const saveApiKey = () => { setApiKey(apiKeyInput.trim()); setApiKeyInput(""); };
  const addSymbol = () => {
    const s = addSymbolInput.trim().toUpperCase();
    if (!s || watchlist.includes(s)) return;
    setWatchlist((prev) => [...prev, s]);
    setAddSymbolInput("");
    setActiveSymbol(s);
  };
  const removeSymbol = (s) => {
    setWatchlist((prev) => prev.filter((x) => x !== s));
    if (activeSymbol === s && watchlist.length > 1) setActiveSymbol(watchlist.find((x) => x !== s));
  };
  const saveManualEntry = () => {
    if (!manualForm.price || !manualForm.sma50) return;
    const today = new Date().toISOString().slice(0, 10);
    const entry = { date: today, price: parseFloat(manualForm.price), sma50: parseFloat(manualForm.sma50), volume: manualForm.volume, rsi: manualForm.rsi ? parseFloat(manualForm.rsi) : null, weeklyMacdBearish: !!manualForm.weeklyMacdBearish, sellPct: 0 };
    const others = (sym.entries || []).filter((e) => e.date !== today);
    updateSym({ entries: [...others, entry], anchor: sym.anchor ?? entry.price });
  };
  const toggleCheck = (cat, idx) => {
    const key = `${cat}-${idx}`;
    updateSym({ checklist: { ...(sym.checklist || {}), [key]: !(sym.checklist || {})[key] } });
  };
  const saveVolCorrection = () => {
    if (!derived.latest) return;
    const raw = parseFloat(volEditRaw);
    const avg = parseFloat(volEditAvg);
    if (!raw || !avg) return;
    const corrected = (sym.entries || []).map((e) =>
      e.date === derived.latest.date ? { ...e, volumeRaw: Math.round(raw), volumeAvg: Math.round(avg), volume: raw > avg ? "above" : "below" } : e
    );
    updateSym({ entries: corrected });
    setVolEditOpen(false);
    setVolEditRaw("");
    setVolEditAvg("");
  };

  return (
    <div style={{ background: C.bg, minHeight: "100vh", color: C.ink, fontFamily: "'IBM Plex Sans', sans-serif", padding: "20px 14px 60px" }}>
      <div style={{ maxWidth: 480, margin: "0 auto" }}>
        <div style={{ marginBottom: 14 }}>
          <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10.5, color: C.cyan, letterSpacing: "0.08em", marginBottom: 3 }}>MULTI-STOCK · TRIGGER TRACKER</div>
          <div style={{ fontSize: 21, fontWeight: 700 }}>Control Panel</div>
          <div style={{ display: "flex", gap: 8, marginTop: 8, flexWrap: "wrap" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 5 }}><StateLight state="dormant" /> <span style={{ fontSize: 10.5, color: C.mute }}>Dormant</span></div>
            <div style={{ display: "flex", alignItems: "center", gap: 5 }}><StateLight state="building" /> <span style={{ fontSize: 10.5, color: C.mute }}>Building</span></div>
            <div style={{ display: "flex", alignItems: "center", gap: 5 }}><StateLight state="triggered" /> <span style={{ fontSize: 10.5, color: C.mute }}>Act now</span></div>
            <div style={{ display: "flex", alignItems: "center", gap: 5 }}><StateLight state="positive" /> <span style={{ fontSize: 10.5, color: C.mute }}>Healthy</span></div>
          </div>
        </div>

        {!apiKey && (
          <Panel style={{ marginBottom: 14, borderColor: C.cyan }}>
            <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 8 }}>
              <span style={{ fontSize: 15 }}>🔑</span>
              <div style={{ fontSize: 13.5, fontWeight: 700 }}>Connect a free data feed</div>
            </div>
            <div style={{ fontSize: 12, color: C.mute, marginBottom: 10, lineHeight: 1.5 }}>
              Get a free API key at twelvedata.com (no card needed), then paste it here. It's stored only in this page's local storage on your device.
            </div>
            <div style={{ display: "flex", gap: 6 }}>
              <div style={{ flex: 1 }}><TextInput value={apiKeyInput} onChange={setApiKeyInput} placeholder="Paste API key" onEnter={saveApiKey} /></div>
              <button onClick={saveApiKey} style={{ background: C.cyan, color: "#0B1A1E", border: "none", borderRadius: 6, padding: "0 14px", fontWeight: 700, cursor: "pointer" }}>Save</button>
            </div>
            <button onClick={() => setManualMode(true)} style={{ marginTop: 10, background: "none", border: "none", color: C.mute, fontSize: 11.5, textDecoration: "underline", cursor: "pointer", padding: 0 }}>Skip — I'll enter readings manually instead</button>
          </Panel>
        )}

        <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 10 }}>
          {watchlist.map((s) => (
            <button key={s} onClick={() => setActiveSymbol(s)} style={{ display: "flex", alignItems: "center", gap: 6, background: s === activeSymbol ? C.cyan : C.panel, color: s === activeSymbol ? "#0B1A1E" : C.ink, border: `1px solid ${s === activeSymbol ? C.cyan : C.border}`, borderRadius: 999, padding: "6px 10px", fontSize: 12.5, fontWeight: 700, cursor: "pointer" }}>
              {s}
              <span onClick={(e) => { e.stopPropagation(); removeSymbol(s); }} style={{ opacity: 0.6, fontSize: 12, lineHeight: 1 }}>✕</span>
            </button>
          ))}
          <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
            <input value={addSymbolInput} onChange={(e) => setAddSymbolInput(e.target.value.toUpperCase())} onKeyDown={(e) => e.key === "Enter" && addSymbol()} placeholder="Add symbol"
              style={{ width: 82, background: C.panelHi, border: `1px solid ${C.border}`, borderRadius: 999, padding: "6px 10px", color: C.ink, fontSize: 12, outline: "none" }} />
            <button onClick={addSymbol} style={{ background: C.panelHi, border: `1px solid ${C.border}`, borderRadius: 999, width: 26, height: 26, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer" }}>
              <span style={{ color: C.mute, fontSize: 15, lineHeight: 1 }}>+</span>
            </button>
          </div>
        </div>

        {apiKey && (
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10, fontSize: 11.5, color: C.mute }}>
            <span>{lastFetched ? `Updated ${lastFetched}` : "Not yet fetched"}</span>
            <button onClick={() => runFetch(activeSymbol)} disabled={fetching} style={{ display: "flex", alignItems: "center", gap: 5, background: "none", border: `1px solid ${C.border}`, borderRadius: 6, padding: "5px 10px", color: C.ink, cursor: "pointer", fontSize: 11.5 }}>
              <span style={{ display: "inline-block", animation: fetching ? "spin 1s linear infinite" : "none" }}>↻</span>
              {fetching ? "Fetching…" : "Refresh"}
            </button>
          </div>
        )}
        {fetchError && (
          <div style={{ background: "rgba(193,69,58,0.12)", border: `1px solid ${C.red}`, borderRadius: 6, padding: "10px 12px", fontSize: 12, marginBottom: 12 }}>
            <div style={{ marginBottom: 8 }}>{fetchError}</div>
            {lastUrl && (
              <div style={{ marginBottom: 8 }}>
                <div style={{ fontSize: 10.5, color: C.mute, marginBottom: 3 }}>Diagnostic link (tap to select, copy into Safari to test directly):</div>
                <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 9.5, color: C.ink, background: C.bg, borderRadius: 4, padding: "6px 8px", wordBreak: "break-all", userSelect: "all" }}>{lastUrl}</div>
              </div>
            )}
            <button onClick={() => setManualMode(true)} style={{ color: C.cyan, background: "none", border: "none", cursor: "pointer", textDecoration: "underline", padding: 0, fontSize: 12 }}>Switch to manual entry</button>
          </div>
        )}

        <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 14 }}>
          <StatusPill label="SYS 1" state={sys1Overall} />
          <StatusPill label="SYS 2" state={sys2Overall} />
          <StatusPill label="SYS 3" state={sys3Overall} />
          <StatusPill label="SYS 4" state={sys4Overall} />
        </div>

        {(manualMode || !apiKey) && (
          <Panel style={{ marginBottom: 14 }}>
            <Label>Manual reading — {activeSymbol}</Label>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 8 }}>
              <NumInput value={manualForm.price} onChange={(v) => setManualForm({ ...manualForm, price: v })} placeholder="Close price" />
              <NumInput value={manualForm.sma50} onChange={(v) => setManualForm({ ...manualForm, sma50: v })} placeholder="50-day SMA" />
            </div>
            <div style={{ marginBottom: 8 }}>
              <div style={{ fontSize: 11, color: C.mute, marginBottom: 4 }}>Volume vs 20-day average</div>
              <Toggle value={manualForm.volume === "above"} onChange={(v) => setManualForm({ ...manualForm, volume: v ? "above" : "below" })} onLabel="Above" offLabel="Below" />
            </div>
            <div style={{ marginBottom: 8 }}>
              <div style={{ fontSize: 11, color: C.mute, marginBottom: 4 }}>Weekly MACD bearish (confirmed Friday close)</div>
              <Toggle value={manualForm.weeklyMacdBearish} onChange={(v) => setManualForm({ ...manualForm, weeklyMacdBearish: v })} onLabel="Yes" offLabel="No" />
            </div>
            <button onClick={saveManualEntry} style={{ width: "100%", background: C.cyan, color: "#0B1A1E", border: "none", borderRadius: 6, padding: "10px 0", fontWeight: 700, cursor: "pointer" }}>Save reading</button>
          </Panel>
        )}

        <Panel style={{ marginBottom: 14 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
            <div style={{ fontSize: 15, fontWeight: 700 }}>System 1 — Profit Ladder</div>
            <button onClick={() => derived.latest && updateSym({ anchor: derived.latest.price, lastAnchorReset: derived.latest.date })} title="Manually reset anchor to current price" style={{ background: "none", border: `1px solid ${C.border}`, borderRadius: 6, padding: 6, cursor: "pointer", display: "flex" }}>
              <span style={{ color: C.mute, fontSize: 13 }}>↺</span>
            </button>
          </div>
          <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 11, color: C.mute, marginBottom: 4 }}>Anchor (auto-tracks new highs)</div>
              <NumInput value={sym.anchor || ""} onChange={(v) => updateSym({ anchor: parseFloat(v) || 0 })} placeholder="52-wk high" />
            </div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 11, color: C.mute, marginBottom: 4 }}>Step %</div>
              <NumInput value={Math.round((sym.step ?? STEP_DEFAULT) * 100)} onChange={(v) => updateSym({ step: (parseFloat(v) || 0) / 100 })} />
            </div>
          </div>
          {sym.lastAnchorReset && (
            <div style={{ fontSize: 10, color: C.amber, marginBottom: 10 }}>Auto-reset on {sym.lastAnchorReset} — price had fallen to 65% or less of the prior anchor.</div>
          )}

          <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 10 }}>
            <StatusPill label={`Batch ${ladderState.batchNumber}`} state="dormant" />
            <StatusPill label={`${ladderState.rungsFired} rungs fired`} state={ladderState.rungsFired > 0 ? "positive" : "dormant"} />
            <StatusPill label={ladderState.floorBlocked ? "50% floor reached" : ladderState.dormant ? "Dormant" : "Armed"} state={ladderState.floorBlocked ? "triggered" : ladderState.dormant ? "building" : "positive"} />
            <StatusPill label={`${ladderState.remainingPct}% of shares left`} state="dormant" />
          </div>
          {ladderState.floorBlocked && (
            <div style={{ fontSize: 10.5, color: C.mute, marginBottom: 10 }}>Hard floor reached — System 1 will not sell further regardless of price, until a manual reset.</div>
          )}
          {!ladderState.floorBlocked && ladderState.dormant && (
            <div style={{ fontSize: 10.5, color: C.mute, marginBottom: 10 }}>Dormant since completing batch {ladderState.batchNumber - 1}. Unlocks on a qualifying re-rating event (manual reset), or a 15%+ pullback from a local high followed by a new high above the last fired rung.</div>
          )}

          {rungs.map((r, i) => {
            const cur = derived.latest?.price;
            const fired = i < ladderState.rungsFired;
            const isNext = !fired && !ladderState.dormant && !ladderState.floorBlocked && cur && r > cur && (i === 0 || rungs[i - 1] <= cur);
            const locked = !fired && (ladderState.dormant || ladderState.floorBlocked);
            const tranche = extensionTranche(r, derived.latest?.sma50);
            return (
              <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "7px 10px", marginBottom: 4, borderRadius: 5, opacity: locked ? 0.45 : 1, background: isNext ? "rgba(79,184,214,0.1)" : fired ? "rgba(79,158,114,0.08)" : "transparent", border: isNext ? `1px solid ${C.cyan}` : "1px solid transparent" }}>
                <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 13 }}>Rung {i + 1} · ${r.toLocaleString()}</span>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <span style={{ fontSize: 10.5, color: C.mute, fontFamily: "'IBM Plex Mono', monospace" }}>sell {tranche}%</span>
                  {fired && <span style={{ fontSize: 10.5, color: C.green, fontWeight: 600 }}>FIRED</span>}
                  {isNext && <span style={{ fontSize: 10.5, color: C.cyan, fontWeight: 600 }}>NEXT</span>}
                  {locked && !fired && <span style={{ fontSize: 10.5, color: C.faint, fontWeight: 600 }}>LOCKED</span>}
                </div>
              </div>
            );
          })}
          <div style={{ fontSize: 10, color: C.faint, marginTop: 8, lineHeight: 1.5 }}>
            Tranche size scales down the further a rung sits above the 50-day SMA — full 8% within 25% extension, 5% between 25–50%, 3% beyond 50%. Rungs fire in batches of 5, then go dormant until a digestion pattern or re-rating event unlocks the next batch. A hard floor blocks any rung that would take remaining shares below 50% of the original count.
          </div>
        </Panel>

        <Panel style={{ marginBottom: 14 }}>
          <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 2 }}>System 2 — Protection Floor</div>
          {derived.latest && (
            <div style={{ fontSize: 12, color: C.mute, marginBottom: 4 }}>
              {activeSymbol}: ${derived.latest.price} vs SMA ${derived.latest.sma50} — <span style={{ color: latestBelow ? C.red : C.green, fontWeight: 600 }}>{latestBelow ? "below trend" : "above trend"}</span>
            </div>
          )}
          {derived.isLiveProvisional && (
            <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 8, background: "rgba(224,168,60,0.1)", borderRadius: 6, padding: "6px 10px" }}>
              <StateLight state="building" />
              <span style={{ fontSize: 10.5, color: C.amber }}>
                Market open — today's bar (${derived.liveEntry.price} live) is still forming and excluded from Path 1–4 until close. Paths below reflect {derived.latest?.date || "the last confirmed session"}.
              </span>
            </div>
          )}
          {derived.latest && (
            <>
            <div style={{ fontSize: 11, color: C.mute, marginBottom: 4, fontFamily: "'IBM Plex Mono', monospace" }}>
              Vol {fmtVol(derived.latest.volumeRaw)} vs avg {fmtVol(derived.latest.volumeAvg)}{" "}
              <span style={{ color: derived.latest.volume === "above" ? C.amber : C.mute, fontFamily: "'IBM Plex Sans', sans-serif" }}>
                ({derived.latest.volume === "above" ? "above" : "below"})
              </span>
            </div>
            {derived.latest.macdLine != null && (
              <div style={{ fontSize: 11, color: C.mute, marginBottom: 8, fontFamily: "'IBM Plex Mono', monospace" }}>
                MACD confirmed (last closed week): {derived.latest.macdLine} vs signal {derived.latest.macdSignal}
                <br />
                MACD provisional (this week so far): {derived.latest.macdLineProvisional} vs signal {derived.latest.macdSignalProvisional}
                {derived.latest.weeklyMacdBearishProvisional !== derived.latest.weeklyMacdBearish && (
                  <span style={{ color: C.amber, fontFamily: "'IBM Plex Sans', sans-serif" }}> — differs from confirmed; this is likely what TradingView shows mid-week</span>
                )}
              </div>
            )}
            <div style={{ fontSize: 11, marginBottom: 8 }}>
              <span
                onClick={() => {
                  setVolEditOpen(!volEditOpen);
                  setVolEditRaw(String(derived.latest.volumeRaw));
                  setVolEditAvg(String(derived.latest.volumeAvg));
                }}
                style={{ color: C.cyan, fontFamily: "'IBM Plex Sans', sans-serif", cursor: "pointer", textDecoration: "underline" }}
              >
                Correct
              </span>
            </div>
            </>
          )}
          {volEditOpen && (
            <div style={{ background: C.panelHi, borderRadius: 6, padding: "10px 12px", marginBottom: 10 }}>
              <div style={{ fontSize: 10.5, color: C.mute, marginBottom: 6 }}>Override this day's volume with a trusted source's figure:</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6, marginBottom: 8 }}>
                <NumInput value={volEditRaw} onChange={setVolEditRaw} placeholder="Actual volume" />
                <NumInput value={volEditAvg} onChange={setVolEditAvg} placeholder="Actual 20-day avg" />
              </div>
              <button onClick={saveVolCorrection} style={{ background: C.cyan, color: "#0B1A1E", border: "none", borderRadius: 6, padding: "7px 0", width: "100%", fontWeight: 700, cursor: "pointer", fontSize: 12.5 }}>
                Save correction
              </button>
            </div>
          )}
          {derived.ewStreak >= 2 && (
            <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 12 }}>
              <StateLight state="building" />
              <span style={{ fontSize: 11.5, color: C.amber }}>Early warning — {derived.ewStreak} sessions below the 20-day SMA. No sale yet, tighten monitoring.</span>
            </div>
          )}
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <StateLight state={p1state} />
              <div><div style={{ fontSize: 13, fontWeight: 600 }}>Path 1 · SMA + volume</div><div style={{ fontSize: 11, color: C.mute }}>{derived.path1Streak} of 2 days confirmed{p1state === "triggered" ? " — sell 10%" : ""}</div></div>
            </div>
            <Tally count={derived.path1Streak} total={2} />
          </div>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <StateLight state={p2state} />
              <div><div style={{ fontSize: 13, fontWeight: 600 }}>Path 2 · Weekly MACD</div><div style={{ fontSize: 11, color: C.mute }}>{derived.path2Active ? "Bearish crossover confirmed — sell 10%" : "No confirmed crossover"}</div></div>
            </div>
          </div>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <StateLight state={p3state} />
              <div><div style={{ fontSize: 13, fontWeight: 600 }}>Path 3 · Persistence</div><div style={{ fontSize: 11, color: C.mute }}>{derived.path3Streak} of 5 sessions below SMA{p3state === "triggered" ? " — sell 10%" : ""}</div></div>
            </div>
            <Tally count={derived.path3Streak} total={5} />
          </div>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 4 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <StateLight state={p4state} />
              <div>
                <div style={{ fontSize: 13, fontWeight: 600 }}>Path 4 · Magnitude + SMA</div>
                <div style={{ fontSize: 11, color: C.mute }}>
                  {derived.p4Tier > 0 && derived.p4Info
                    ? `Tier ${derived.p4Tier} active — sell ${derived.p4Info.pct}% (≥${derived.p4Info.threshold}% below anchor, below SMA)`
                    : "No drawdown tier active"}
                </div>
              </div>
            </div>
          </div>
          {derived.dual && (
            <div style={{ marginTop: 12, background: "rgba(193,69,58,0.12)", border: `1px solid ${C.red}`, borderRadius: 6, padding: "10px 12px", display: "flex", gap: 8 }}>
              <span style={{ color: C.red, fontSize: 15, flexShrink: 0 }}>⚠</span>
              <div style={{ fontSize: 12.5 }}><strong style={{ color: C.red }}>Dual confirmation —</strong> Path {derived.dual[0].path} and Path {derived.dual[1].path} both fired within 3 weeks. Sell 30%.</div>
            </div>
          )}
          {mandatoryReview.relevant && mandatoryReview.newLowWithinWindow && (
            <div style={{ marginTop: 12, background: "rgba(148,86,196,0.12)", border: `1px solid ${C.violet}`, borderRadius: 6, padding: "10px 12px", display: "flex", gap: 8 }}>
              <span style={{ color: C.violet, fontSize: 15, flexShrink: 0 }}>⚠</span>
              <div style={{ fontSize: 12.5 }}>
                <strong style={{ color: C.violet }}>Mandatory review triggered —</strong> price made a new low within 10 sessions of the {mandatoryReview.severeDate} severe sell. Do a full System 4 review before any further automatic action — don't just re-fire the same paths or auto-exit on price alone.
              </div>
            </div>
          )}
          <div style={{ marginTop: 12, paddingTop: 10, borderTop: `1px solid ${C.border}` }}>
            <div style={{ fontSize: 11, color: C.mute, marginBottom: 8, fontWeight: 600 }}>Rolling 10-day coordination cap</div>
            <RollingCapVisual rollingWindow={derived.rollingWindow} sellEvents={derived.sellEvents} cumSellPct={derived.cumSellPct} onClear={clearSell} />
            <div style={{ fontSize: 10, color: C.faint, margin: "10px 0 6px" }}>This only reflects sells you log below — the app shows you triggers, it doesn't assume you acted on them. Backdate it if you sold a few days ago, and enter the actual execution price if it differed from that day's close.</div>
            <div style={{ display: "flex", gap: 6, marginBottom: 6 }}>
              <input
                type="date"
                value={sellLogDate}
                onChange={(e) => setSellLogDate(e.target.value)}
                style={{ flex: 1, background: C.panelHi, border: `1px solid ${C.border}`, borderRadius: 6, padding: "8px 10px", color: C.ink, fontFamily: "'IBM Plex Mono', monospace", fontSize: 13 }}
              />
              <div style={{ flex: 1 }}>
                <NumInput value={sellLogPrice} onChange={setSellLogPrice} placeholder="Price sold at" />
              </div>
            </div>
            <div style={{ display: "flex", gap: 6 }}>
              <NumInput value={sellLogInput} onChange={setSellLogInput} placeholder="% sold" />
              <button onClick={logSell} style={{ background: C.cyan, color: "#0B1A1E", border: "none", borderRadius: 6, padding: "0 14px", fontWeight: 700, cursor: "pointer", fontSize: 12.5 }}>Log</button>
            </div>
          </div>
        </Panel>

        {reentry.relevant && (
          <Panel style={{ marginBottom: 14 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
              <div style={{ fontSize: 15, fontWeight: 700 }}>Re-Entry Signal</div>
              <StatusPill label={reentryBlocked ? "Blocked by Sys 4" : reentryFinal ? "Confirmed" : "Not yet"} state={reentryBlocked ? "dormant" : reentryFinal ? "positive" : "building"} />
            </div>
            <div style={{ fontSize: 11.5, color: C.mute, marginBottom: 12 }}>After a sell, re-enter only on a confirmed reversal — never to catch a falling knife. All three conditions must hold at once.</div>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
              <StateLight state={reentry.rsiCondition ? "positive" : "dormant"} />
              <span style={{ fontSize: 12.5, color: reentry.rsiCondition ? C.ink : C.mute }}>RSI dipped below 45, then turned back upward</span>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
              <StateLight state={reentry.smaReclaim ? "positive" : "dormant"} />
              <span style={{ fontSize: 12.5, color: reentry.smaReclaim ? C.ink : C.mute }}>Price reclaimed the 50-day SMA on above-average volume</span>
            </div>
            <div onClick={toggleReentryConfirm} style={{ display: "flex", alignItems: "flex-start", gap: 8, padding: "8px 0 2px", cursor: "pointer", borderTop: `1px solid ${C.border}`, paddingTop: 10 }}>
              <div style={{ width: 15, height: 15, borderRadius: 3, border: `1.5px solid ${sym.reentryConfirmed ? C.green : C.border}`, background: sym.reentryConfirmed ? C.green : "transparent", flexShrink: 0, marginTop: 1 }} />
              <span style={{ fontSize: 12.5, color: sym.reentryConfirmed ? C.ink : C.mute, lineHeight: 1.4 }}>I've confirmed no deterioration in the core demand/technology roadmap in the last 90 days</span>
            </div>
            {reentryBlocked && <div style={{ marginTop: 10, background: "rgba(148,86,196,0.12)", border: `1px solid ${C.violet}`, borderRadius: 6, padding: "8px 10px", fontSize: 11.5, color: C.violet }}>System 4 has flagged items — re-entry needs a fresh fundamental assessment, not just a technical reversal.</div>}
            {!reentryBlocked && reentryFinal && <div style={{ marginTop: 10, background: "rgba(79,158,114,0.12)", border: `1px solid ${C.green}`, borderRadius: 6, padding: "8px 10px", fontSize: 11.5, color: C.green }}>All three conditions met — re-entry confirmed.</div>}
          </Panel>
        )}

        <Panel style={{ marginBottom: 14 }}>
          <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 6 }}>System 3 — Earnings Discipline</div>
          <div style={{ fontSize: 10.5, color: C.mute, marginBottom: 10 }}>
            Shares the same rolling cap as System 2: <strong style={{ color: C.ink }}>{derived.cumSellPct}%</strong> of 35% used — full day-by-day breakdown in System 2 above.
          </div>
          <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 4 }}>
            <input type="date" value={sym.earningsDate || ""} onChange={(e) => updateSym({ earningsDate: e.target.value })}
              style={{ background: C.panelHi, border: `1px solid ${C.border}`, borderRadius: 6, padding: "8px 10px", color: C.ink, fontFamily: "'IBM Plex Mono', monospace", fontSize: 13 }} />
            <div style={{ fontSize: 12.5, color: daysToEarnings !== null && daysToEarnings <= 3 && daysToEarnings >= 0 ? C.amber : C.mute, fontWeight: 600 }}>
              {daysToEarnings === null ? "Set a date" : daysToEarnings > 0 ? `${daysToEarnings} days away` : daysToEarnings === 0 ? "Today" : "Passed — log outcome"}
            </div>
          </div>
          <div style={{ fontSize: 10.5, color: C.faint, marginBottom: 10 }}>Set this manually from the company's own investor relations page — vendor earnings-calendar data has been unreliable for this field and isn't auto-fetched.</div>

          <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 4 }}>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 11, color: C.mute, marginBottom: 4 }}>
                Trailing EPS{" "}
                {sym.trailingEPSSource === "auto" && <span style={{ color: C.cyan, fontSize: 9.5 }}>(auto-fetched — verify)</span>}
              </div>
              <NumInput value={sym.trailingEPS || ""} onChange={(v) => updateSym({ trailingEPS: parseFloat(v) || null, trailingEPSSource: "manual" })} placeholder="e.g. 10.53" />
            </div>
            <div style={{ flex: 1, textAlign: "right" }}>
              <div style={{ fontSize: 11, color: C.mute, marginBottom: 4 }}>Live P/E</div>
              <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 16, fontWeight: 700, color: C.ink }}>{currentPE ? currentPE.toFixed(1) + "×" : "—"}</div>
            </div>
          </div>
          <div style={{ fontSize: 10, color: C.faint, marginBottom: 10 }}>
            Computed from live price ÷ EPS — only EPS needs updating, once a quarter. Auto-fetch sums the last 4 <em>actually reported</em> quarters from Twelve Data's earnings history — different data than the earnings-date calendar that was unreliable, but still worth a one-time check against the company's own filings before trusting it fully.
          </div>

          {peTier && (
            <div style={{ background: C.panelHi, borderRadius: 6, padding: "8px 10px", marginBottom: 10, fontSize: 11.5 }}>
              Pre-earnings insurance sell at this valuation ({peTier.label}): <strong style={{ color: C.ink }}>{peTier.pct}%</strong>
            </div>
          )}

          {daysToEarnings !== null && daysToEarnings <= 0 && !sym.earningsOutcome && (
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6 }}>
              {Object.entries(OUTCOME_ACTIONS).map(([key, o]) => (
                <button key={key} onClick={() => updateSym({ earningsOutcome: key })} style={{ background: C.panelHi, border: `1px solid ${C.border}`, borderRadius: 6, padding: 8, fontSize: 11, color: C.ink, cursor: "pointer", textAlign: "left" }}>{o.label}</button>
              ))}
            </div>
          )}
          {sym.earningsOutcome && (
            <div style={{ background: C.panelHi, borderRadius: 6, padding: "10px 12px", fontSize: 12.5 }}>
              <div style={{ fontWeight: 600, marginBottom: 3 }}>{OUTCOME_ACTIONS[sym.earningsOutcome].label}</div>
              <div style={{ color: C.mute }}>{OUTCOME_ACTIONS[sym.earningsOutcome].note}</div>
              <button onClick={() => { const next = new Date(sym.earningsDate); next.setMonth(next.getMonth() + 3); updateSym({ earningsOutcome: null, earningsDate: next.toISOString().slice(0, 10) }); }}
                style={{ marginTop: 8, background: "none", border: "none", color: C.cyan, fontSize: 11.5, cursor: "pointer", padding: 0 }}>Set next quarter's date →</button>
            </div>
          )}
        </Panel>

        <Panel style={{ marginBottom: 14 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div style={{ fontSize: 15, fontWeight: 700 }}>System 4 — Full Exit Protocol</div>
            <StatusPill label={`${flaggedCount} flagged`} state={flaggedCount > 0 ? "triggered" : "dormant"} />
          </div>
          {Object.entries(CHECKLIST).map(([cat, data]) => (
            <Collapsible key={cat} title={data.title}>
              {data.items.map((item, idx) => {
                const checked = !!(sym.checklist || {})[`${cat}-${idx}`];
                return (
                  <div key={idx} onClick={() => toggleCheck(cat, idx)} style={{ display: "flex", alignItems: "flex-start", gap: 8, padding: "6px 0", cursor: "pointer" }}>
                    <div style={{ width: 15, height: 15, borderRadius: 3, border: `1.5px solid ${checked ? C.violet : C.border}`, background: checked ? C.violet : "transparent", flexShrink: 0, marginTop: 1 }} />
                    <span style={{ fontSize: 12.5, color: checked ? C.ink : C.mute, lineHeight: 1.4 }}>{item}</span>
                  </div>
                );
              })}
            </Collapsible>
          ))}
        </Panel>

        <Panel style={{ marginBottom: 14 }}>
          <Collapsible title={`History — ${activeSymbol} (${(sym.entries || []).length} entries)`}>
            {[...(sym.entries || [])].sort((a, b) => b.date.localeCompare(a.date)).map((e, i) => (
              <div key={i} style={{ display: "flex", justifyContent: "space-between", fontSize: 11.5, fontFamily: "'IBM Plex Mono', monospace", padding: "5px 0", borderBottom: `1px solid ${C.border}`, color: C.mute }}>
                <span>{e.date}</span>
                <span>
                  ${e.price} / sma ${e.sma50} / vol {fmtVol(e.volumeRaw)} ({fmtVol(e.volumeAvg)} avg)
                  {Number(e.sellPct) > 0 && <strong style={{ color: C.amber }}> · sold {e.sellPct}%</strong>}
                </span>
              </div>
            ))}
          </Collapsible>
        </Panel>

        <div style={{ fontSize: 10.5, color: C.faint, lineHeight: 1.6, padding: "0 4px" }}>
          Live data via Twelve Data, fetched directly from your browser using your own API key, stored only on this device. Not financial advice.
          <br />
          <span style={{ opacity: 0.6 }}>Build: 2026-07-19-weeklyfix</span>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<StockTracker />);
</script>
</body>
</html>
